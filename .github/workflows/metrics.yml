name: Metrics
on:
  # Her gece saat 00:00'da kendi kendine çalışır
  schedule: [{cron: "0 0 * * *"}]
  # GitHub Actions sekmesinden elinle tetikleyebilmeni sağlar
  workflow_dispatch:
  # Koda her push attığında güncellenir
  push: {branches: ["main", "master"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: resulcankirti
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Istanbul
